<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Show Times</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th { background: #333; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #ddd; }
    tr:hover { background: #f0f0f0; }
    button { background: #333; color: white; border: none;
      padding: 6px 12px; cursor: pointer; border-radius: 4px; }
    a { color: #333; }
  </style>
</head>
<body>
<h1>🎬 Show Times</h1>
<a href="/">← Back to Movies</a>

<h2>Available Shows</h2>
<table>
  <tr>
    <th>ID</th>
    <th>Time</th>
    <th>Action</th>
  </tr>
  <tr th:each="showTime : ${showTimes}">
    <td th:text="${showTime.showTimeId}"></td>
    <td th:text="${showTime.time}"></td>
    <td>
      <a th:href="@{/reserve(movieId=${movieId},showTimeId=${showTime.showTimeId})}">
        <button>Reserve</button>
      </a>
    </td>
  </tr>
</table>
</body>
</html>
