<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cinema Ticket</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #333; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f0f0f0; }
        button { background: #333; color: white; border: none;
            padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #555; }
    </style>
</head>
<body>
<h1>🎬 Cinema Ticket System</h1>

<br>
<h2>🔍 Find Reservation</h2>
<form method="get" action="/reservation" style="display:flex; gap:10px;">
    <input type="text" name="reservationId" placeholder="Enter Reservation ID"
           style="padding:8px; width:300px; border:1px solid #ddd; border-radius:4px;"/>
    <button type="submit"
            style="background:#333; color:white; border:none;
                   padding:8px 16px; cursor:pointer; border-radius:4px;">
        Search
    </button>
</form>

<h2>Movies</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Duration</th>
        <th>Action</th>
    </tr>
    <tr th:each="movie : ${movies}">
        <td th:text="${movie.movieId}"></td>
        <td th:text="${movie.title}"></td>
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.duration} + ' min'"></td>
        <td>
            <a th:href="@{/showtimes(movieId=${movie.movieId})}">
                <button>Show Times</button>
            </a>
        </td>
    </tr>
</table>
</body>
</html>
